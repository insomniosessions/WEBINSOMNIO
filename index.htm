<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Compra tus Tickets</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}
body{
    min-height:100vh;
    overflow-x:hidden;
    background:#000;
    color:#fff;
    padding:0;
}
.container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:10px;
    width:100%;
}
.ticket-box{
    width:100%;
    max-width:600px;
    background:rgba(15,15,15,.92);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:25px;
    padding:20px;
    box-shadow:0 0 50px rgba(0,0,0,.45);
}
.ticket-box h1{
    text-align:center;
    font-size:28px;
    margin-bottom:8px;
    line-height:1.2;
}
.ticket-box p{
    text-align:center;
    color:#bdbdbd;
    margin-bottom:16px;
    font-size:14px;
}
.option-card{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    background:#141414;
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:12px;
    margin-bottom:10px;
}
.option-left{
    display:flex;
    align-items:center;
    gap:12px;
    min-width:0;
    flex:1;
}
.icon-box{
    width:50px;
    height:50px;
    border-radius:12px;
    background:#262626;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    flex-shrink:0;
}
.option-title{
    font-size:14px;
    font-weight:700;
    line-height:1.3;
}
.option-price{
    font-size:18px;
    font-weight:800;
    margin-top:4px;
}
.option-sub{
    font-size:11px;
    color:#9b9b9b;
    margin-top:2px;
}
.option-controls{
    display:flex;
    align-items:center;
    gap:8px;
    flex-shrink:0;
}
.qty-btn{
    width:32px;
    height:32px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.08);
    background:#1f1f1f;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}
.qty-btn:hover{
    background:#25D366;
    color:#000;
}
.qty-box{
    width:30px;
    text-align:center;
    font-size:16px;
    font-weight:700;
}
.summary{
    margin-top:16px;
    background:#111;
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:15px;
}
.summary-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:6px;
    font-size:14px;
    align-items:center;
}
.summary-total{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid rgba(255,255,255,.08);
}
.summary-total strong{
    font-size:24px;
    color:#25D366;
}
.purchase-summary{
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid rgba(255,255,255,.08);
    color:#bdbdbd;
    line-height:1.5;
    font-size:13px;
}
.buy-btn{
    display:block;
    width:100%;
    margin-top:14px;
    text-align:center;
    background:#25D366;
    color:black;
    text-decoration:none;
    padding:14px;
    border-radius:15px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}
.buy-btn:hover{
    transform:translateY(-2px);
}

@media(max-width:500px){
    body{ padding:0; }
    .container{
        padding:8px;
        min-height:100vh;
        height:100vh;
    }
    .ticket-box{
        padding:15px;
        max-width:100%;
        border-radius:20px;
    }
    .ticket-box h1{ font-size:22px; margin-bottom:6px; }
    .ticket-box p{ font-size:13px; margin-bottom:12px; }
    .option-card{
        flex-direction:column;
        align-items:stretch;
        padding:10px;
    }
    .option-left{
        width:100%;
        flex-direction:column;
        align-items:stretch;
        gap:8px;
    }
    .icon-box{
        width:45px;
        height:45px;
        font-size:22px;
        align-self:center;
    }
    .option-title{ font-size:13px; }
    .option-price{ font-size:16px; }
    .option-sub{ font-size:10px; }
    .option-controls{
        width:100%;
        justify-content:center;
        margin-top:8px;
        padding-top:4px;
        border-top:1px solid rgba(255,255,255,.05);
    }
    .qty-btn{ width:36px; height:36px; font-size:20px; }
    .qty-box{ width:35px; font-size:17px; }
    .summary{ padding:12px; margin-top:12px; }
    .summary-row{ font-size:13px; }
    .summary-total{ margin-top:8px; padding-top:8px; }
    .summary-total strong{ font-size:22px; }
    .purchase-summary{ font-size:12px; margin-top:8px; padding-top:8px; }
    .buy-btn{ padding:12px; font-size:15px; margin-top:12px; border-radius:12px; }
}

@media(max-width:360px){
    .ticket-box h1{ font-size:20px; }
    .ticket-box p{ font-size:12px; }
    .option-title{ font-size:12px; }
    .option-price{ font-size:15px; }
    .buy-btn{ font-size:14px; padding:11px; }
}
</style>
</head>
<body>

<div class="container">
<div class="ticket-box">

<h1>COMPRA TUS TICKETS</h1>
<p>Selecciona la cantidad de cada opción</p>

<div id="options"></div>

<div class="summary">
    <div class="summary-row">
        <span>Total de items:</span>
        <span id="totalItems">0</span>
    </div>
    <div class="summary-total">
        <span>Total a pagar</span>
        <strong>$<span id="totalPrice">0</span></strong>
    </div>
    <div id="purchaseSummary" class="purchase-summary">
        No hay tickets seleccionados.
    </div>
</div>

<a id="whatsappBtn" class="buy-btn" target="_blank">
   Comprar por WhatsApp
</a>

</div>
</div>

<script>
const phone = "56912345678";

const products = [
    { id:"p1", icon:"🎟️", title:"PREVENTA 2 | NORMAL", price:10000, subtitle:"Hasta 19 jun 2026" },
    { id:"p2", icon:"🎟️", title:"PREVENTA 2 | NORMAL + 2 COVER", price:12000, subtitle:"Hasta 19 jun 2026" },
    { id:"p3", icon:"🎟️", title:"GRUPO 5 PERSONAS | 5 ENTRADAS", price:45000, subtitle:"Pack especial" },
    { id:"p4", icon:"🎟️", title:"GRUPO 5 PERSONAS | 5 ENTRADAS + 10 COVER", price:55000, subtitle:"Pack especial" },
    { id:"p5", icon:"🎟️", title:"GRUPO 10 PERSONAS | 10 ENTRADAS", price:80000, subtitle:"Pack especial" },
    { id:"p6", icon:"🎟️", title:"GRUPO 10 PERSONAS | 10 ENTRADAS + 10 SHOT TEQUILA + 10 COVER", price:100000, subtitle:"Pack especial" }
];

const state = {};
products.forEach(p => state[p.id] = 0);

function formatCLP(n){ return n.toLocaleString("es-CL"); }

function renderOptions(){
    document.getElementById("options").innerHTML = products.map(p => `
    <div class="option-card">
        <div class="option-left">
            <div class="icon-box">${p.icon}</div>
            <div>
                <div class="option-title">${p.title}</div>
                <div class="option-price">$ ${formatCLP(p.price)}</div>
                <div class="option-sub">${p.subtitle}</div>
            </div>
        </div>
        <div class="option-controls">
            <button class="qty-btn" onclick="changeQty('${p.id}',-1)">−</button>
            <div class="qty-box" id="qty-${p.id}">0</div>
            <button class="qty-btn" onclick="changeQty('${p.id}',1)">+</button>
        </div>
    </div>`).join("");
}

function changeQty(id, delta){
    state[id] = Math.max(0, state[id] + delta);
    document.getElementById(`qty-${id}`).innerText = state[id];
    updateSummary();
}

function updateSummary(){
    let total = 0, items = 0, lines = [];
    products.forEach(p=>{
        const qty = state[p.id];
        if(qty > 0){
            const subtotal = qty * p.price;
            total += subtotal;
            items += qty;
            lines.push(`• ${p.title} x${qty} = $${formatCLP(subtotal)}`);
        }
    });
    document.getElementById("totalItems").innerText = items;
    document.getElementById("totalPrice").innerText = formatCLP(total);
    document.getElementById("purchaseSummary").innerHTML = lines.length ? lines.join("<br>") : "No hay tickets seleccionados.";
    const message = lines.length ? `Hola 👋\n\nQuiero comprar:\n\n${lines.join("\n")}\n\nTotal a pagar: $${formatCLP(total)}` : `Hola 👋\n\nQuiero comprar entradas.`;
    document.getElementById("whatsappBtn").href = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
}

renderOptions();
updateSummary();
</script>

</body>
</html>
